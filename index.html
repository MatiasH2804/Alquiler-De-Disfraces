<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Alquileres</title>
    <link rel="icon" type="image/png" href="https://github.com/MatiasH2804/Alquiler-De-Disfraces/blob/main/Gemini_Generated_Image_awe9o3awe9o3awe9%20(1).png?raw=true">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="https://github.com/MatiasH2804/Alquiler-De-Disfraces/blob/main/Gemini_Generated_Image_awe9o3awe9o3awe9%20(1).png?raw=true" 
                     alt="Logo" width="50" height="50" class="d-inline-block align-text-top me-2" style="border-radius: 8px; object-fit: cover;">
                <span class="mb-0 h1">Sistema de Reservas</span>
            </a>
        </div>
    </nav>

    <div class="container">
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="clientes-tab" data-bs-toggle="tab" data-bs-target="#clientes" type="button" role="tab" onclick="renderTable('Clientes')">Clientes</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="disfrazes-tab" data-bs-toggle="tab" data-bs-target="#disfrazes" type="button" role="tab" onclick="renderTable('Disfrazes')">Disfrazes</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="reservas-tab" data-bs-toggle="tab" data-bs-target="#reservas" type="button" role="tab" onclick="renderTable('Reservas')">Reservas</button>
            </li>
        </ul>

        <div class="tab-content mt-3" id="myTabContent">
            <div id="loader" class="text-center d-none">
                <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
            </div>
            
            <div class="row mb-3 align-items-center">
                <div class="col-md-5" id="searchContainer" style="display: none;">
                    <input type="text" id="searchInput" class="form-control" placeholder="Buscar cliente por nombre o DNI..." oninput="renderTable('Clientes')">
                </div>
                <div class="col-md-5" id="searchResContainer" style="display: none;">
                    <div class="input-group">
                        <input type="text" id="searchResInput" class="form-control" placeholder="Buscar reserva (Enter)..." onkeypress="if(event.key==='Enter') renderTable('Reservas')">
                        <button class="btn btn-primary" onclick="renderTable('Reservas')">Buscar</button>
                    </div>
                </div>
                <div class="col-md-4" id="sortContainer" style="display: none;">
                    <select id="sortSelect" class="form-select" onchange="renderTable('Disfrazes')">
                        <option value="Nombre">Ordenar por Nombre (A-Z)</option>
                        <option value="Talle">Ordenar por Talle (Menor a Mayor)</option>
                        <option value="Estádo">Ordenar por Estado (Peor a Mejor)</option>
                        <option value="Color">Ordenar por Color (A-Z)</option>
                    </select>
                </div>
                <div class="col-md-3 ms-auto text-end">
                    <button class="btn btn-success" onclick="openModal()">+ Nuevo Registro</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover" id="dataTable">
                    <thead id="tableHead" class="table-dark"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Formulario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="dataForm"></form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveRecord()">Guardar</button>
                </div>
            </div>
        </div>
    </div>

<div class="modal fade" id="flashcardModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title m-0">Última Reserva</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="flashcardContent"></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzLvuOUWu07KVcKxRH0a-SXN-Qg1vzm1eRwR2GgnzVIyQVvQ-tRK9pMbe11Lc93QvttAA/exec"; 
        let appKey = "";
        let currentTab = "Clientes";
        let dbData = { clientes: [], disfrazes: [], reservas: [] };
        const modal = new bootstrap.Modal(document.getElementById('formModal'));

        // Jerarquías lógicas para ordenamiento
        const sizeOrder = { "XS": 1, "S": 2, "M": 3, "L": 4, "XL": 5, "XXL": 6, "XXXL": 7 };
        const stateOrder = { "Muy deteriorado": 1, "Desgastado": 2, "Usado": 3, "Funcional": 4, "Conservado": 5, "Como nuevo": 6 };

        window.onload = async () => {
            appKey = prompt("Ingrese la clave del sistema:");
            if (!appKey) document.body.innerHTML = "<h2 class='text-center mt-5'>Acceso denegado</h2>";
            else await loadData();
        };

        async function apiCall(action, data = {}) {
            document.getElementById('loader').classList.remove('d-none');
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action, appKey, data })
                });
                const json = await res.json();
                if (!json.ok) throw new Error(json.error);
                return json.data;
            } catch (error) {
                alert("Error: " + error.message);
                throw error;
            } finally {
                document.getElementById('loader').classList.add('d-none');
            }
        }

        async function loadData() {
            dbData = await apiCall("getAll");
            renderTable(currentTab);
        }

        function renderTable(tabName) {
            currentTab = tabName;
            let data = [...(dbData[tabName.toLowerCase()] || [])]; 
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            thead.innerHTML = ""; tbody.innerHTML = "";

            // Manejo de la visibilidad de herramientas
            document.getElementById('searchContainer').style.display = tabName === 'Clientes' ? 'block' : 'none';
            if(document.getElementById('searchResContainer')) document.getElementById('searchResContainer').style.display = tabName === 'Reservas' ? 'block' : 'none';
            document.getElementById('sortContainer').style.display = tabName === 'Disfrazes' ? 'block' : 'none';

            if (data.length === 0) return;

// Lógica de filtrado y ordenamiento según pestaña
            if (tabName === 'Clientes') {
                // Filtrar duplicados históricos por DNI
                const unicos = [];
                const dnisVistos = new Set();
                let hayDuplicadosHistoricos = false;

                data.forEach(c => {
                    let dniStr = String(c['DNI'] || "").trim();
                    if (!dnisVistos.has(dniStr)) {
                        dnisVistos.add(dniStr);
                        unicos.push(c);
                    } else {
                        hayDuplicadosHistoricos = true;
                    }
                });
                data = unicos;

                if (hayDuplicadosHistoricos && !document.getElementById('dupWarning')) {
                   const warn = document.createElement('div');
                   warn.id = 'dupWarning';
                   warn.className = 'alert alert-warning py-2 mb-2';
                   warn.innerHTML = `<small>⚠️ Se ocultaron clientes con DNI duplicado de la vista (datos históricos). Se recomienda limpiar la base de datos.</small>`;
                   document.getElementById('searchContainer').parentNode.insertAdjacentElement('afterend', warn);
                } else if (!hayDuplicadosHistoricos && document.getElementById('dupWarning')) {
                   document.getElementById('dupWarning').remove();
                }

                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                if (searchTerm) {
                    data = data.filter(c => 
                        (c['Nombre y Apellido'] && String(c['Nombre y Apellido']).toLowerCase().includes(searchTerm)) ||
                        (c['DNI'] && String(c['DNI']).toLowerCase().includes(searchTerm))
                    );
                }
                data.sort((a, b) => (a['Nombre y Apellido'] || '').localeCompare(b['Nombre y Apellido'] || ''));
            } 
            else if (tabName === 'Disfrazes') {
                if(document.getElementById('dupWarning')) document.getElementById('dupWarning').remove();
                const sortBy = document.getElementById('sortSelect').value;
                data.sort((a, b) => {
                    if (sortBy === 'Talle') return (sizeOrder[a[sortBy]] || 99) - (sizeOrder[b[sortBy]] || 99);
                    if (sortBy === 'Estádo') return (stateOrder[a[sortBy]] || 99) - (stateOrder[b[sortBy]] || 99);
                    return (String(a[sortBy]) || '').localeCompare(String(b[sortBy]) || '');
                });
            }
            else if (tabName === 'Reservas') {
                if(document.getElementById('dupWarning')) document.getElementById('dupWarning').remove();
                
                let sRes = document.getElementById('searchResInput') ? document.getElementById('searchResInput').value.toLowerCase().trim() : "";
                if (sRes) {
                    data = data.filter(r => {
                        let cl = dbData.clientes.find(c => c['IDCliente'] === r['Cliente']);
                        let di = dbData.disfrazes.find(d => d['IDDisfraz'] === r['Disfraz']);
                        let nomCl = cl ? String(cl['Nombre y Apellido']).toLowerCase() : "";
                        let nomDi = di ? String(di['Nombre']).toLowerCase() : "";
                        return nomCl.includes(sRes) || nomDi.includes(sRes);
                    });
                }
                
                data.sort((a, b) => new Date(a['Fecha entrega'] || 0) - new Date(b['Fecha entrega'] || 0));
            }

            let allKeys = Object.keys(dbData[tabName.toLowerCase()][0] || data[0]);
            let visibleHeaders = allKeys.filter(h => !h.startsWith('ID'));

            let trHead = "<tr>";
            visibleHeaders.forEach(h => trHead += `<th>${h}</th>`);
            if (tabName === 'Reservas') trHead += `<th>Saldo</th>`; 
            trHead += "<th>Acciones</th></tr>";
            thead.innerHTML = trHead;

            let idCol = allKeys.find(k => k.startsWith('ID'));

            data.forEach(row => {
                let tr = "<tr>";
                let idVal = row[idCol];
                
                visibleHeaders.forEach(h => {
                    let val = row[h] !== undefined ? row[h] : '';

                    if (tabName === 'Reservas') {
                        if (h === 'Cliente') {
                            let rel = dbData.clientes.find(c => c['IDCliente'] === val);
                            if (rel) val = rel['Nombre y Apellido'];
                        }
                        if (h === 'Disfraz') {
                            let rel = dbData.disfrazes.find(d => d['IDDisfraz'] === val);
                            if (rel) val = rel['Nombre'];
                        }
                    }

                    if ((h === 'Fecha entrega' || h === 'Fecha devolusión') && val) {
                        let dateStr = String(val);
                        if (dateStr.includes('T')) dateStr = dateStr.split('T')[0];
                        let parts = dateStr.split('-');
                        if (parts.length === 3 && parts[0].length === 4) {
                            val = `${parts[2]}-${parts[1]}-${parts[0]}`; 
                        } else if (parts.length !== 3) {
                            let d = new Date(val);
                            if (!isNaN(d.getTime())) {
                                val = `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
                            }
                        }
                    }

                    tr += `<td>${val}</td>`;
                });

                if (tabName === 'Reservas') {
                    let disfraz = dbData.disfrazes.find(d => d.IDDisfraz === row['Disfraz']);
                    let precio = disfraz ? parseFloat(disfraz['Precio De Alquiler']) || 0 : 0;
                    let sena = parseFloat(row['Seña']) || 0;
                    let pagoFinal = parseFloat(row['Pago Final']) || 0;
                    let saldo = precio - (sena + pagoFinal);
                    
                    let saldoHtml = saldo <= 0 
                        ? `<span class="badge bg-success">PAGADO</span>` 
                        : `<span class="text-danger fw-bold">$${saldo}</span>`;
                    tr += `<td>${saldoHtml}</td>`;
                }

                tr += `<td>`;
                if(tabName === 'Clientes') {
                    tr += `<button class="btn btn-sm btn-primary me-1" onclick="showClientInfo('${idVal}')">Info</button>`;
                }
                if(tabName === 'Reservas') {
                   if(row['Fue entregado?'] !== true && row['Fue entregado?'] !== 'TRUE') 
                     tr += `<button class="btn btn-sm btn-info me-1" onclick="marcar('marcarEntregado', '${idVal}')">Entregar</button>`;
                   if(row['Fue devuelto?'] !== true && row['Fue devuelto?'] !== 'TRUE') 
                     tr += `<button class="btn btn-sm btn-warning me-1" onclick="marcar('marcarDevuelto', '${idVal}')">Devuelto</button>`;
                }
                tr += `<button class="btn btn-sm btn-danger" onclick="deleteRecord('${idCol}', '${idVal}')">Borrar</button></td></tr>`;
                tbody.innerHTML += tr;
            });
        }

        function openModal() {
            const form = document.getElementById('dataForm');
            form.innerHTML = "";
            document.getElementById('modalTitle').innerText = `Nuevo ${currentTab}`;
            
            if (currentTab === "Clientes") {
                form.innerHTML = `
                    <input type="text" id="f_nombre" class="form-control mb-2" placeholder="Nombre y Apellido" required>
                    <input type="text" id="f_telefono" class="form-control mb-2" placeholder="Teléfono">
                    <input type="number" id="f_dni" class="form-control mb-2" placeholder="DNI" required>
                    <textarea id="f_obs" class="form-control mb-2" placeholder="Observaciones"></textarea>
                `;
            } else if (currentTab === "Disfrazes") {
                form.innerHTML = `
                    <input type="text" id="f_nombre" class="form-control mb-2" placeholder="Nombre" required>
                    <select id="f_talle" class="form-control mb-2" required>
                        <option value="">Seleccione Talle...</option>
                        <option value="XS">XS: Extra Small</option>
                        <option value="S">S: Small</option>
                        <option value="M">M: Medium</option>
                        <option value="L">L: Large</option>
                        <option value="XL">XL: Extra Large</option>
                        <option value="XXL">XXL: Extra Extra Large</option>
                        <option value="XXXL">XXXL: Extra Extra Extra Large</option>
                    </select>
                    <input type="text" id="f_tipo" class="form-control mb-2" placeholder="Tipo">
                    <select id="f_estado" class="form-control mb-2" required>
                        <option value="">Seleccione Estado...</option>
                        <option value="Muy deteriorado">Muy deteriorado (En malas condiciones)</option>
                        <option value="Desgastado">Desgastado</option>
                        <option value="Usado">Usado</option>
                        <option value="Funcional">Funcional</option>
                        <option value="Conservado">Conservado</option>
                        <option value="Como nuevo">Como nuevo (En buenas condiciones)</option>
                    </select>
                    <input type="text" id="f_color" class="form-control mb-2" placeholder="Color">
                    <input type="number" id="f_precio" class="form-control mb-2" placeholder="Precio De Alquiler">
                    <input type="text" id="f_imagen" class="form-control mb-2" placeholder="URL Imágen">
                    <select id="f_disp" class="form-control mb-2"><option value="true">Disponible</option><option value="false">No Disponible</option></select>
                `;
            } else if (currentTab === "Reservas") {
                let clientesOpts = dbData.clientes.map(c => `<option value="${c['IDCliente']}">${c['Nombre y Apellido']}</option>`).join('');
// Calcular disponibles reales combinando disponibilidad + reservas activas
                let disponiblesReales = dbData.disfrazes.filter(d => {
                   if(d['Disponibilidad'] !== true && String(d['Disponibilidad']).toLowerCase() !== 'true') return false;
                   let estaReservado = dbData.reservas.some(r => r['Disfraz'] === d['IDDisfraz'] && (r['Fue devuelto?'] !== true && String(r['Fue devuelto?']).toLowerCase() !== 'true'));
                   return !estaReservado;
                });
                
                let disOpts = disponiblesReales.map(d => `<option value="${d['IDDisfraz']}" data-precio="${d['Precio De Alquiler']}">${d['Nombre']} - $${d['Precio De Alquiler']}</option>`).join('');
                form.innerHTML = `
                    <select id="f_cliente" class="form-control mb-2" required><option value="">Seleccione Cliente...</option>${clientesOpts}</select>
                    <select id="f_disfraz" class="form-control mb-2" onchange="calcSaldo()" required><option value="">Seleccione Disfraz (Solo Disponibles)...</option>${disOpts}</select>
<label>Fecha Entrega</label><input type="date" id="f_entrega" class="form-control mb-2" required>
                    <label>Fecha Devolusión (Opcional)</label><input type="date" id="f_devolusion" class="form-control mb-2">
                    <label>Seña</label><input type="number" id="f_sena" class="form-control mb-2" value="0" onkeyup="calcSaldo()" required>
                    <div class="alert alert-info">
                        <strong>Monto Total: </strong> $<span id="lbl_total">0</span><br>
                        <strong>Saldo: </strong> $<span id="lbl_saldo">0</span>
                    </div>
                `;
            }
            modal.show();
        }

        function calcSaldo() {
            if(currentTab !== 'Reservas') return;
            const select = document.getElementById('f_disfraz');
            if(!select.value) return;
            const precio = parseFloat(select.options[select.selectedIndex].getAttribute('data-precio') || 0);
            const sena = parseFloat(document.getElementById('f_sena').value || 0);
            document.getElementById('lbl_total').innerText = precio;
            document.getElementById('lbl_saldo').innerText = precio - sena;
        }

        async function saveRecord() {
            let record = {};
            try {
                if (currentTab === "Clientes") {
                    if(!document.getElementById('f_dni').value.match(/^\d+$/)) throw new Error("DNI numérico");
                    record = {
                        "Nombre y Apellido": document.getElementById('f_nombre').value,
                        "Teléfono": document.getElementById('f_telefono').value,
                        "DNI": document.getElementById('f_dni').value,
                        "Observaciones": document.getElementById('f_obs').value
                    };
                } else if (currentTab === "Disfrazes") {
                    record = {
                        "Nombre": document.getElementById('f_nombre').value,
                        "Talle": document.getElementById('f_talle').value,
                        "Tipo": document.getElementById('f_tipo').value,
                        "Estádo": document.getElementById('f_estado').value,
                        "Color": document.getElementById('f_color').value,
                        "Precio De Alquiler": document.getElementById('f_precio').value,
                        "Imágen": document.getElementById('f_imagen').value,
                        "Disponibilidad": document.getElementById('f_disp').value === "true"
                    };
                } else if (currentTab === "Reservas") {
                    let dEntrega = new Date(document.getElementById('f_entrega').value);
                    let fechaDev = document.getElementById('f_devolusion').value;
                    
                    if(fechaDev) {
                       let dDevolucion = new Date(fechaDev);
                       if(dDevolucion < dEntrega) throw new Error("Fecha devolución menor a entrega");
                    }
                    
                    record = {
                        "Cliente": document.getElementById('f_cliente').value,
                        "Disfraz": document.getElementById('f_disfraz').value,
                        "Fecha entrega": document.getElementById('f_entrega').value,
                        "Fecha devolusión": fechaDev,
                        "Seña": document.getElementById('f_sena').value
                    };
                    await apiCall("crearReserva", { record });
                    modal.hide();
                    await loadData();
                    return;
                }
                
                await apiCall("add", { sheet: currentTab, record });
                modal.hide();
                await loadData();
            } catch(e) { alert(e.message); }
        }

        async function deleteRecord(idCol, idVal) {
            if(!confirm("¿Seguro que desea borrar?")) return;
            await apiCall("delete", { sheet: currentTab, idCol, idVal });
            await loadData();
        }

        async function marcar(action, idReserva) {
            await apiCall(action, { idReserva });
            await loadData();
        }

        function showClientInfo(idCliente) {
            let res = dbData.reservas.filter(r => r['Cliente'] === idCliente);
            if(res.length === 0) {
                document.getElementById('flashcardContent').innerHTML = "<p class='text-muted m-0'>Sin reservas registradas.</p>";
                new bootstrap.Modal(document.getElementById('flashcardModal')).show();
                return;
            }
            res.sort((a, b) => new Date(b['Fecha entrega'] || 0) - new Date(a['Fecha entrega'] || 0));
            let u = res[0];
            let dis = dbData.disfrazes.find(d => d['IDDisfraz'] === u['Disfraz']);
            let precio = dis ? parseFloat(dis['Precio De Alquiler']) || 0 : 0;
            let sena = parseFloat(u['Seña']) || 0;
            let pagoFinal = parseFloat(u['Pago Final']) || 0;
            let saldo = precio - (sena + pagoFinal);
            let dev = u['Fue devuelto?'] === true || String(u['Fue devuelto?']).toUpperCase() === 'TRUE';
            let est = !dev ? "ACTIVA" : (saldo > 0 ? "PENDIENTE" : "PAGADA");
            
            document.getElementById('flashcardContent').innerHTML = `
                <p class="mb-1"><strong>Disfraz:</strong> ${dis ? dis['Nombre'] : '-'}</p>
                <p class="mb-1"><strong>Entrega:</strong> ${u['Fecha entrega'] ? String(u['Fecha entrega']).split('T')[0] : '-'}</p>
                <p class="mb-2"><strong>Devolución:</strong> ${u['Fecha devolusión'] ? String(u['Fecha devolusión']).split('T')[0] : '-'}</p>
                <p class="mb-3"><strong>Estado:</strong> <span class="badge bg-${est==='PAGADA'?'success':(est==='ACTIVA'?'primary':'warning')}">${est}</span></p>
                <hr class="my-2">
                <div class="d-flex justify-content-between small"><span>Precio:</span> <span>$${precio}</span></div>
                <div class="d-flex justify-content-between small"><span>Seña:</span> <span>$${sena}</span></div>
                <div class="d-flex justify-content-between small mb-2"><span>Pago Final:</span> <span>$${pagoFinal}</span></div>
                <h6 class="m-0 text-end text-${saldo>0?'danger':'success'}">Saldo: $${saldo}</h6>
            `;
            new bootstrap.Modal(document.getElementById('flashcardModal')).show();
        }
    </script>
</body>
</html>
